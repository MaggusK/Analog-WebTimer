<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analog WebTimer</title>
    <style>
        :root {
            --animation-size: 22px;
        }

        * {
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            height: 100vh;
            margin: 0;
            padding: 0;
            background-color: #282c34;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            font-size: clamp(10px, 1.5vh, 16px);
            transition: background-color 0.5s, color 0.5s;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        #mainContent {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-evenly;
            flex: 1;
            width: 100%;
            padding: 2vh 1vh;
        }
        .fade-out {
            animation: fadeOut 3s forwards;
        }
        @keyframes fadeOut {
            to {
                background-color: black;
                color: black;
            }
        }

        #additionalText {
            font-size: clamp(16px, 5vh, 80px);
            text-align: center;
            max-width: 95vw;
            word-wrap: break-word;
            flex-shrink: 0;
        }

        #clockContainer {
            position: relative;
            width: clamp(300px, 65vh, 650px);
            height: clamp(300px, 65vh, 650px);
            flex-shrink: 0;
        }

        #pieChart {
            width: 100%;
            height: 100%;
            transition: opacity 0.3s ease;
            transform: rotate(90deg) scaleX(-1);
        }

        .pie-background {
            fill: none;
            stroke: rgba(255, 255, 255, 0.1);
            stroke-width: 13;
        }

        .pie-progress {
            fill: none;
            stroke: #61dafb;
            stroke-width: 13;
            transition: stroke 0.3s ease;
            stroke-linecap: butt;
        }

        .fade-out #pieChart,
        .fade-out #minuteLabels,
        .fade-out #additionalText {
            opacity: 0;
            transition: opacity 3s;
        }

        #minuteLabels {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .minute-label {
            position: absolute;
            font-size: clamp(16px, 2.8vh, 34px);
            font-weight: bold;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        #control-box {
            position: fixed;
            bottom: 2vh;
            right: 2vh;
            transition: opacity 0.5s;
            width: auto;
            max-width: min(500px, 40vw);
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 1vh;
            padding: 0;
        }

        #control-box.visible {
            opacity: 1;
        }

        #control-box:not(.visible) {
            opacity: 0;
        }

        .controls {
            display: flex;
            gap: clamp(5px, 1vw, 15px);
            justify-content: flex-end;
            flex-wrap: wrap;
            transition: opacity 0.5s;
            width: 100%;
        }

        .controls button {
            padding: clamp(5px, 1vh, 10px) clamp(10px, 2vw, 20px);
            font-size: clamp(12px, 1.5vh, 16px);
            cursor: pointer;
            background-color: rgba(74, 85, 104, 0.95);
            color: white;
            border: 1px solid #ffffff;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        .controls button:hover {
            background-color: rgba(90, 102, 120, 0.95);
        }

        .settings {
            background-color: rgba(72, 79, 94, 0.95);
            border: 1px solid #ffffff;
            border-radius: 5px;
            padding: clamp(8px, 1.5vh, 15px);
            color: #ffffff;
            font-family: Helvetica, Arial, sans-serif;
            width: 100%;
            max-height: 50vh;
            overflow-y: auto;
        }

        .setting {
            display: flex;
            align-items: center;
            margin: clamp(3px, 0.5vh, 8px) 0;
            font-size: clamp(11px, 1.5vh, 14px);
            gap: clamp(5px, 1vw, 10px);
            flex-wrap: wrap;
        }

        .setting label {
            min-width: clamp(120px, 30%, 190px);
            flex-shrink: 0;
        }

        .setting input[type="text"] {
            padding: clamp(3px, 0.5vh, 6px);
            font-size: clamp(11px, 1.5vh, 14px);
            border: 1px solid #ffffff;
            border-radius: 3px;
            background-color: #5a6678;
            color: white;
        }

        #customText {
            flex: 1;
            min-width: clamp(150px, 40%, 300px);
            max-width: 100%;
        }

        #bgColor, #chartColor {
            width: clamp(50px, 10vw, 70px);
            height: clamp(25px, 3vh, 35px);
            padding: 2px;
            border: 1px solid #ffffff;
            border-radius: 3px;
            background-color: #5a6678;
            cursor: pointer;
        }

        .time-slider-container {
            display: flex;
            align-items: center;
            gap: clamp(10px, 2vw, 15px);
            flex: 1;
        }

        #timeSlider {
            flex: 1;
            min-width: clamp(120px, 30vw, 200px);
            height: clamp(6px, 0.8vh, 8px);
            -webkit-appearance: none;
            appearance: none;
            background: linear-gradient(to right, #5a6678 0%, #61dafb 100%);
            border-radius: 10px;
            outline: none;
            cursor: pointer;
        }

        #timeSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: clamp(18px, 2.5vh, 24px);
            height: clamp(18px, 2.5vh, 24px);
            background: #61dafb;
            border: 2px solid #ffffff;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
        }

        #timeSlider::-webkit-slider-thumb:hover {
            transform: scale(1.15);
            box-shadow: 0 0 8px rgba(97, 218, 251, 0.6);
        }

        #timeSlider::-moz-range-thumb {
            width: clamp(18px, 2.5vh, 24px);
            height: clamp(18px, 2.5vh, 24px);
            background: #61dafb;
            border: 2px solid #ffffff;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
        }

        #timeSlider::-moz-range-thumb:hover {
            transform: scale(1.15);
            box-shadow: 0 0 8px rgba(97, 218, 251, 0.6);
        }

        #timeDisplay {
            font-size: clamp(13px, 1.5vh, 16px);
            font-weight: bold;
            color: #61dafb;
            min-width: clamp(70px, 15vw, 100px);
            text-align: right;
        }

        .color-settings {
            display: flex;
            gap: clamp(5px, 1vw, 10px);
            align-items: stretch;
            flex-wrap: wrap;
        }

        .color-inputs {
            display: flex;
            flex-direction: column;
            gap: clamp(3px, 0.5vh, 8px);
        }

        .theme-previews {
            display: flex;
            gap: clamp(5px, 1vw, 10px);
            flex-wrap: wrap;
        }

        .theme-preview {
            width: clamp(50px, 10vw, 70px);
            height: clamp(53px, 6.5vh, 78px);
            border: 1px solid #fff;
            border-radius: 3px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: clamp(6px, 0.8vh, 8px);
            line-height: 1.2;
            padding: 2px;
            transition: transform 0.2s;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
        }

        .theme-preview:hover {
            transform: scale(1.05);
        }

        .theme-preview .preview-text {
            font-size: clamp(4px, 0.6vh, 6px);
            text-align: center;
            margin-bottom: 1px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            width: 100%;
        }

        .theme-preview .preview-time {
            font-weight: bold;
        }

        .setting select {
            padding: clamp(3px, 0.5vh, 6px);
            font-size: clamp(11px, 1.5vh, 14px);
            border: 1px solid #ffffff;
            border-radius: 3px;
            background-color: #5a6678;
            color: white;
            cursor: pointer;
            min-width: clamp(100px, 15vw, 150px);
        }

        #backgroundAnimation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0;
            transition: opacity 3s;
            pointer-events: none;
        }

        #backgroundAnimation.active {
            opacity: 1;
        }

        .fade-out #backgroundAnimation {
            opacity: 0 !important;
        }

        /* Background animation: Flicker effect */
        #backgroundAnimation.anim-flicker {
            background: conic-gradient(from 175deg at 48% 68%, hsla(0,0%,98%,1) 0deg, #f0c530 68deg, #ed4d4d 140deg, #729cb7 220deg, #50fec1 292deg, hsla(0,0%,98%,1) 1turn);
            mask:
                radial-gradient(circle at 50% 50%, white 2.2px, transparent 2.7px) 50% 50% / var(--animation-size) var(--animation-size),
                url("https://assets.codepen.io/605876/noise-mask.png") 256px 50% / 256px 256px;
            mask-composite: intersect;
            animation: flicker 22s infinite linear;
        }

        @keyframes flicker {
            to {
                mask-position: 50% 50%, 0 50%;
            }
        }

        /* Background animation: Gradient wave effect */
        #backgroundAnimation.anim-gradient {
            background: linear-gradient(-42deg, #ef7a55, #e83f80, #26a8d7, #26d7ad);
            background-size: 420% 420%;
            animation: gradient 65s ease infinite;
        }

        @keyframes gradient {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        /* Background animation: Blob effect */
        #backgroundAnimation.anim-blob {
            background-color: #081d3b;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #backgroundAnimation.anim-blob .gradient {
            --size: 780px;
            --speed: 22s;
            --easing: cubic-bezier(0.78, 0.22, 0.18, 0.82);
            width: var(--size);
            height: var(--size);
            filter: blur(calc(var(--size) / 4.8));
            background-image: linear-gradient(hsl(220, 82%, 58%), hsl(166, 76%, 69%));
            animation: rotate var(--speed) var(--easing) alternate infinite;
            border-radius: 32% 68% 68% 32% / 28% 32% 68% 72%;
            transition: all 0.5s ease-out;
        }

        @keyframes rotate {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        @media (min-width: 720px) {
            #backgroundAnimation.anim-blob .gradient {
                --size: 520px;
            }
        }

        .github-link {
            font-size: clamp(8px, 1vh, 10px);
            opacity: 0.7;
            margin-top: 0.5vh;
            text-align: right;
        }

        .github-link a {
            color: inherit;
            text-decoration: none;
        }

        .github-link a:hover {
            text-decoration: underline;
        }

        /* Responsive adjustments for smaller screens */
        @media (max-height: 600px) {
            #additionalText {
                font-size: clamp(14px, 4vh, 60px);
                margin-bottom: 1vh;
            }

            #clockContainer {
                width: clamp(200px, 45vh, 400px);
                height: clamp(200px, 45vh, 400px);
            }

            .settings {
                max-height: 30vh;
            }
        }

        @media (max-width: 600px) {
            #control-box {
                bottom: 0;
                right: 0;
                left: 0;
                max-width: 100vw;
                align-items: center;
                padding: 1vh;
                background: linear-gradient(to top, rgba(40, 44, 52, 0.95) 0%, rgba(40, 44, 52, 0.9) 70%, transparent 100%);
            }

            .controls {
                justify-content: center;
            }

            .setting {
                flex-direction: column;
                align-items: flex-start;
            }

            .setting label {
                width: 100%;
            }

            #customText {
                width: 100%;
            }

            .time-slider-container {
                width: 100%;
            }

            #clockContainer {
                width: clamp(250px, 55vh, 400px);
                height: clamp(250px, 55vh, 400px);
            }
        }
    </style>
</head>
<body>
    <div id="backgroundAnimation"></div>
    <div id="mainContent">
        <div id="additionalText">be right back...</div>

        <div id="clockContainer">
            <svg id="pieChart" viewBox="0 0 200 200">
                <circle class="pie-background" cx="100" cy="100" r="78" />
                <circle id="pieProgress" class="pie-progress" cx="100" cy="100" r="78" />
            </svg>
            <div id="minuteLabels"></div>
        </div>
    </div>

    <div id="control-box">
        <div class="controls" id="controls">
            <button id="start-button" onclick="startTimer()">Start</button>
            <button id="pause-button" onclick="pauseTimer()">Pause</button>
            <button onclick="resetTimer()">Reset</button>
        </div>
        <div class="settings" id="settings">
            <div class="setting">
                <label for="timeSlider">Select Time:</label>
                <div class="time-slider-container">
                    <input type="range" id="timeSlider" min="3" max="30" value="5" oninput="updateTimeFromSlider()" />
                    <span id="timeDisplay">5 Minutes</span>
                </div>
            </div>
            <div class="setting">
                <label for="customText">Additional Text:</label>
                <input type="text" id="customText" value="be right back..." placeholder="Additional Text" onchange="updateDisplay()" />
            </div>
            <div class="setting">
                <label>Colors:</label>
                <div class="color-settings">
                    <div class="color-inputs">
                        <input type="color" id="bgColor" value="#282c34" onchange="updateDisplay()" title="Background Color" />
                        <input type="color" id="chartColor" value="#61dafb" onchange="updateDisplay()" title="Chart Color" />
                    </div>
                    <div class="theme-previews">
                        <button class="theme-preview" onclick="applyTheme('rgb(186, 189, 182)', 'rgb(117, 80, 123)')" style="background-color: rgb(186, 189, 182); color: rgb(117, 80, 123);">
                            <div class="preview-text">Text</div>
                            <div class="preview-time">5:00</div>
                        </button>
                        <button class="theme-preview" onclick="applyTheme('rgb(92, 53, 102)', 'rgb(252, 175, 62)')" style="background-color: rgb(92, 53, 102); color: rgb(252, 175, 62);">
                            <div class="preview-text">Text</div>
                            <div class="preview-time">5:00</div>
                        </button>
                        <button class="theme-preview" onclick="applyTheme('rgb(243, 243, 243)', 'rgb(114, 159, 207)')" style="background-color: rgb(243, 243, 243); color: rgb(114, 159, 207);">
                            <div class="preview-text">Text</div>
                            <div class="preview-time">5:00</div>
                        </button>
                        <button class="theme-preview" onclick="applyTheme('rgb(62, 66, 128)', 'rgb(233, 207, 28)')" style="background-color: rgb(62, 66, 128); color: rgb(233, 207, 28);">
                            <div class="preview-text">Text</div>
                            <div class="preview-time">5:00</div>
                        </button>
                    </div>
                </div>
            </div>
            <div class="setting">
                <label for="animationSelect">Animation:</label>
                <select id="animationSelect" onchange="updateAnimation()">
                    <option value="none">None</option>
                    <option value="flicker">Flicker Gradient</option>
                    <option value="gradient">Gradient Wave</option>
                    <option value="blob">Blob Gradient</option>
                </select>
            </div>
        </div>
        <div class="github-link">
            <a href="https://github.com/MaggusK/Analog-WebTimer/" target="_blank" rel="noopener noreferrer">Analog WebTimer on GitHub</a> | GPL-3.0
        </div>
    </div>

    <script>
        let timer;
        let timeLeft;
        let totalTime;
        let selectedMinutes = 5;
        let isRunning = false;
        let isPaused = false;

        /* Language detection */
        const lang = navigator.language.startsWith('de') ? 'de' : 'en';

        const translations = {
            de: {
                start: 'Start',
                pause: 'Pause',
                continue: 'Weiter',
                reset: 'Zurücksetzen',
                selectTime: 'Zeit auswählen:',
                minutes: 'Minuten',
                minute: 'Minute',
                additionalText: 'Zusätzlicher Text:',
                additionalTextPlaceholder: 'Zusätzlicher Text',
                colors: 'Farben:',
                bgColorTitle: 'Hintergrundfarbe',
                chartColorTitle: 'Diagrammfarbe',
                animation: 'Animation:',
                animationNone: 'Keine',
                animationFlicker: 'Flicker Gradient',
                animationGradient: 'Gradient Welle',
                animationBlob: 'Blob Gradient',
                defaultText: 'gleich gehts weiter...'
            },
            en: {
                start: 'Start',
                pause: 'Pause',
                continue: 'Continue',
                reset: 'Reset',
                selectTime: 'Select Time:',
                minutes: 'Minutes',
                minute: 'Minute',
                additionalText: 'Additional Text:',
                additionalTextPlaceholder: 'Additional Text',
                colors: 'Colors:',
                bgColorTitle: 'Background Color',
                chartColorTitle: 'Chart Color',
                animation: 'Animation:',
                animationNone: 'None',
                animationFlicker: 'Flicker Gradient',
                animationGradient: 'Gradient Wave',
                animationBlob: 'Blob Gradient',
                defaultText: 'be right back...'
            }
        };

        const t = translations[lang];

        const controlBox = document.getElementById('control-box');
        const pauseButton = document.getElementById('pause-button');
        const pieProgress = document.getElementById('pieProgress');
        const backgroundAnimation = document.getElementById('backgroundAnimation');
        const animationSelect = document.getElementById('animationSelect');
        const themePreviews = document.querySelectorAll('.theme-preview');

        /* Show/hide controls on mouseover */
        controlBox.addEventListener('mouseover', () => {
            controlBox.classList.add('visible');
        });

        controlBox.addEventListener('mouseleave', () => {
            controlBox.classList.remove('visible');
        });

        function updateTimeFromSlider() {
            if (isRunning) return;

            const slider = document.getElementById('timeSlider');
            const display = document.getElementById('timeDisplay');

            selectedMinutes = parseInt(slider.value);
            totalTime = selectedMinutes * 60;
            timeLeft = totalTime;

            const minuteText = selectedMinutes === 1 ? t.minute : t.minutes;
            display.textContent = selectedMinutes + ' ' + minuteText;

            updateDisplay();
            saveSettings();
        }

        function createMinuteLabels() {
            const container = document.getElementById('minuteLabels');
            container.innerHTML = '';

            const centerX = 50;
            const centerY = 50;
            const labelRadius = 47; /* Outside the ring, adjusted for small displays */

            for (let i = selectedMinutes; i >= 1; i--) {
                /* Start at top (0 degrees) and go clockwise */
                /* selectedMinutes at 0°, (selectedMinutes-1) at next position clockwise, etc. */
                const angle = ((selectedMinutes - i) * (360 / selectedMinutes)) * (Math.PI / 180);
                const x = centerX + labelRadius * Math.sin(angle);
                const y = centerY - labelRadius * Math.cos(angle);

                const label = document.createElement('div');
                label.className = 'minute-label';
                label.textContent = i;
                label.style.left = x + '%';
                label.style.top = y + '%';

                container.appendChild(label);
            }
        }

        function updatePieChart() {
            const progress = timeLeft / totalTime;
            const radius = 78;
            const circumference = 2 * Math.PI * radius;

            /* Set the stroke-dasharray and stroke-dashoffset */
            /* stroke-dasharray: full circumference */
            /* stroke-dashoffset: moves based on progress (0 = full, circumference = empty) */
            pieProgress.style.strokeDasharray = circumference;
            pieProgress.style.strokeDashoffset = circumference * (1 - progress);
        }

        function startTimer() {
            if (isRunning) return;

            if (timeLeft === undefined || timeLeft <= 0) {
                timeLeft = selectedMinutes * 60;
                totalTime = timeLeft;
            }

            isRunning = true;
            isPaused = false;
            pauseButton.textContent = t.pause;
            updateDisplay();

            timer = setInterval(() => {
                if (!isPaused) {
                    timeLeft -= 1;
                    if (timeLeft < 0) timeLeft = 0;

                    updateDisplay();

                    if (timeLeft <= 0) {
                        clearInterval(timer);
                        document.body.classList.add('fade-out');
                        isRunning = false;
                    }
                }
            }, 1000);
        }

        function pauseTimer() {
            if (!isRunning) return;

            if (isPaused) {
                isPaused = false;
                pauseButton.textContent = t.pause;
            } else {
                isPaused = true;
                pauseButton.textContent = t.continue;
            }
        }

        function resetTimer() {
            clearInterval(timer);
            isRunning = false;
            isPaused = false;
            timeLeft = selectedMinutes * 60;
            totalTime = timeLeft;
            pauseButton.textContent = t.pause;
            updateDisplay();
            document.body.classList.remove('fade-out');
        }

        function applyTheme(backgroundColor, textColorValue) {
            /* Convert RGB to Hex for color inputs */
            document.getElementById('bgColor').value = rgbToHex(backgroundColor);
            document.getElementById('chartColor').value = rgbToHex(textColorValue);
            updateDisplay();
        }

        function rgbToHex(rgb) {
            const match = rgb.match(/\d+/g);
            if (!match) return '#000000';
            const r = parseInt(match[0]);
            const g = parseInt(match[1]);
            const b = parseInt(match[2]);
            return '#' + [r, g, b].map(x => {
                const hex = x.toString(16);
                return hex.length === 1 ? '0' + hex : hex;
            }).join('');
        }

        function updateAnimation() {
            const animation = animationSelect.value;

            /* Remove all animation classes and clear content */
            backgroundAnimation.className = '';
            backgroundAnimation.innerHTML = '';

            /* Add selected animation class */
            if (animation !== 'none') {
                backgroundAnimation.classList.add('active');
                backgroundAnimation.classList.add('anim-' + animation);

                /* Add gradient div for blob animation */
                if (animation === 'blob') {
                    const gradientDiv = document.createElement('div');
                    gradientDiv.className = 'gradient';
                    backgroundAnimation.appendChild(gradientDiv);
                }
            }

            saveSettings();
        }

        function updateThemePreviews() {
            const previewText = document.getElementById('customText').value || 'Text';
            const previewTime = selectedMinutes + ':00';

            themePreviews.forEach(preview => {
                preview.querySelector('.preview-text').textContent = previewText;
                preview.querySelector('.preview-time').textContent = previewTime;
            });
        }

        function updateDisplay() {
            /* Update additional text */
            document.getElementById('additionalText').textContent =
                document.getElementById('customText').value;

            /* Update colors */
            document.body.style.backgroundColor = document.getElementById('bgColor').value;
            document.body.style.color = document.getElementById('chartColor').value;
            pieProgress.style.stroke = document.getElementById('chartColor').value;

            /* Update ring chart */
            if (timeLeft === undefined) {
                timeLeft = selectedMinutes * 60;
                totalTime = timeLeft;
            }
            updatePieChart();

            /* Update minute labels */
            createMinuteLabels();

            /* Update theme preview buttons */
            updateThemePreviews();

            /* Save settings */
            saveSettings();
        }

        function saveSettings() {
            const settings = {
                selectedMinutes: selectedMinutes,
                customText: document.getElementById('customText').value,
                bgColor: document.getElementById('bgColor').value,
                chartColor: document.getElementById('chartColor').value,
                animation: animationSelect.value
            };
            localStorage.setItem('analogTimerSettings', JSON.stringify(settings));
        }

        function initializeTexts() {
            /* Set button texts */
            document.querySelector('button[onclick="startTimer()"]').textContent = t.start;
            pauseButton.textContent = t.pause;
            document.querySelector('button[onclick="resetTimer()"]').textContent = t.reset;

            /* Set labels */
            const labels = document.querySelectorAll('.setting label');
            document.querySelector('label[for="timeSlider"]').textContent = t.selectTime;
            document.querySelector('label[for="customText"]').textContent = t.additionalText;
            document.querySelectorAll('.setting label')[2].textContent = t.colors;
            document.querySelector('label[for="animationSelect"]').textContent = t.animation;

            /* Set placeholders and tooltips */
            document.getElementById('customText').placeholder = t.additionalTextPlaceholder;
            document.getElementById('bgColor').title = t.bgColorTitle;
            document.getElementById('chartColor').title = t.chartColorTitle;

            /* Set animation options */
            const options = animationSelect.querySelectorAll('option');
            options[0].textContent = t.animationNone;
            options[1].textContent = t.animationFlicker;
            options[2].textContent = t.animationGradient;
            options[3].textContent = t.animationBlob;

            /* Set default text if none set and no saved settings */
            if (!localStorage.getItem('analogTimerSettings')) {
                document.getElementById('customText').value = t.defaultText;
                document.getElementById('additionalText').textContent = t.defaultText;
            }
        }

        function loadSettings() {
            const saved = localStorage.getItem('analogTimerSettings');
            if (saved) {
                try {
                    const settings = JSON.parse(saved);
                    selectedMinutes = settings.selectedMinutes || 5;
                    document.getElementById('customText').value = settings.customText || t.defaultText;
                    document.getElementById('bgColor').value = settings.bgColor || '#282c34';
                    document.getElementById('chartColor').value = settings.chartColor || '#61dafb';
                    animationSelect.value = settings.animation || 'none';

                    /* Update slider and display */
                    const slider = document.getElementById('timeSlider');
                    const display = document.getElementById('timeDisplay');
                    slider.value = selectedMinutes;
                    const minuteText = selectedMinutes === 1 ? t.minute : t.minutes;
                    display.textContent = selectedMinutes + ' ' + minuteText;
                } catch (e) {
                    console.error('Error loading settings:', e);
                }
            }
        }

        /* Initialize on page load */
        document.addEventListener('DOMContentLoaded', () => {
            initializeTexts();
            loadSettings();
            controlBox.classList.add('visible');
            timeLeft = selectedMinutes * 60;
            totalTime = timeLeft;
            updateAnimation();
            updateDisplay();

            /* Mouse wheel support for time slider */
            const timeSlider = document.getElementById('timeSlider');
            timeSlider.addEventListener('wheel', (e) => {
                e.preventDefault();
                const currentValue = parseInt(timeSlider.value);
                const delta = e.deltaY > 0 ? -1 : 1;
                let newValue = currentValue + delta;

                if (newValue < 3) newValue = 3;
                if (newValue > 30) newValue = 30;

                timeSlider.value = newValue;
                updateTimeFromSlider();
            });
        });

        /* Update on window resize */
        window.addEventListener('resize', () => {
            createMinuteLabels();
        });
    </script>
</body>
</html>
